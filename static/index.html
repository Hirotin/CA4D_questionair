<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>動画アンケートスタジオ「Video Survey Studio」</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-phase="start">
    <div class="page-shell">
      <section id="start-stage" class="stage-card start-stage">
        <div class="start-form">
          <label class="user-meta-field" for="user-name">
            <span class="user-meta-label">User名「User Name」</span>
            <input
              id="user-name"
              class="user-meta-input"
              type="text"
              maxlength="80"
              placeholder="入力してください「Enter your user name」"
              autocomplete="nickname"
              required
              aria-required="true"
            />
          </label>
          <label id="access-password-field" class="user-meta-field" for="access-password">
            <span class="user-meta-label">開始パスワード「Start Password」</span>
            <input
              id="access-password"
              class="user-meta-input"
              type="password"
              placeholder="入力してください「Enter password」"
              autocomplete="current-password"
            />
          </label>
          <button id="start-survey" class="primary-button start-button" type="button" disabled>
            回答を始める「Start Survey」
          </button>
          <p
            id="start-readiness-status"
            class="start-status"
            data-state="info"
          >
            開始時に認証と Google Sheets の保存状態を確認します。「Authentication and Google Sheets availability will be checked before the survey starts.」
          </p>
        </div>
      </section>

      <section id="survey-stage" class="stage-card survey-stage" hidden>
        <div class="survey-progress">
          <div class="survey-progress-head">
            <p id="question-counter" class="question-counter">質問 1 / 1「Question 1 / 1」</p>
            <p id="progress-note" class="progress-note">0 / 6 回答済み「0 / 6 answered」</p>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <strong id="progress-value" class="progress-value">Q1 / 1</strong>
        </div>

        <div class="question-focus">
          <h2 id="question-text" class="question-title">読み込み中...「Loading...」</h2>
        </div>

        <div id="reference-panel" class="reference-panel" hidden></div>

        <div class="lane-scroll">
          <div id="video-grid" class="lane-grid video-grid" aria-live="polite"></div>
        </div>

        <div class="question-actions question-actions-bottom">
          <button id="next-question" class="primary-button" type="button">次の質問「Next Question」</button>
        </div>
      </section>

      <section id="completion-stage" class="completion-stage" hidden>
        <p id="completion-message" class="completion-message">
          お疲れ様でした。回答はローカルパスに保存されています。「Thank you. Your responses have been saved to the local path.」
        </p>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
